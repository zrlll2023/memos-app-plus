spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/memosplus_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: 127.0.0.1
      port: 6379

knife4j:
  enable: true

